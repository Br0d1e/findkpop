<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FindKpop — Groups</title>

<link rel="icon" type="image/png" href="findkpop.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0a0f;
  --card: #12121a;
  --border: #1f1f2a;
  --text: #ffffff;
  --muted: #9ca3af;
  --green: #00ffa6;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
}

/* NAVBAR (EXACT STYLE YOU PROVIDED) */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 60px;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px);
}

.logo {
  font-weight: 700;
  font-size: 20px;
}

.nav a {
  color: var(--muted);
  margin-left: 25px;
  text-decoration: none;
  transition: 0.2s;
}

.nav a:hover {
  color: white;
}

/* HERO */
.hero {
  text-align: center;
  padding: 90px 20px 20px;
}

.hero h1 {
  font-size: 60px;
  font-weight: 700;
  background: linear-gradient(to right, #ffffff, #aaaaaa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero p {
  margin-top: 10px;
  color: var(--muted);
}

/* FILTER */
.filter {
  text-align: center;
  margin-top: 20px;
}

.filter select {
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  color: white;
  outline: none;
}

/* GRID */
.grid {
  padding: 40px 60px 80px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 18px;
}

/* CARD */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  text-align: center;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-6px);
  border-color: #2a2a3a;
}

.card img {
  width: 100%;
  aspect-ratio: 1/1;
  border-radius: 12px;
  object-fit: cover;
  margin-bottom: 10px;
}

.card h3 {
  font-size: 14px;
}

.card p {
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
}

.badge {
  margin-top: 8px;
  font-size: 10px;
  padding: 4px 8px;
  border-radius: 999px;
  display: inline-block;
  background: rgba(0,255,166,0.1);
  color: var(--green);
  border: 1px solid rgba(0,255,166,0.2);
}
</style>
</head>

<body>

<!-- NAVBAR (same structure as your other page) -->
<div class="nav">
  <div class="logo">FindKpop</div>
  <div>
    <a href="index.html">Home</a>
    <a href="artists.html">Artists</a>

</div>

<!-- HERO -->
<div class="hero">
  <h1>K-pop Groups</h1>

  <div class="filter">

      <option value="boy">Boy Groups</option>
      <option value="girl">Girl Groups</option>

  filtered.forEach(a => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `

}
