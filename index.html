<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FindKpop — Find the Best K-pop Deals</title>

<link rel="icon" type="image/png" href="findkpop.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0a0f;
  --card: #12121a;
  --border: #1f1f2a;
  --text: #ffffff;
  --muted: #9ca3af;
  --accent: linear-gradient(135deg, #ff2ec4, #7a5cff);
  --green: #00ffa6;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
}

/* NAVBAR */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 60px;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px);
}

.logo {
  font-weight: 700;
  font-size: 20px;
}

.nav a {
  color: var(--muted);
  margin-left: 25px;
  text-decoration: none;
  transition: 0.2s;
}

.nav a:hover {
  color: white;
}

/* HERO */
.hero {
  text-align: center;
  padding: 120px 20px 60px;
}

.hero h1 {
  font-size: 64px;
  font-weight: 700;

  background: linear-gradient(to right, #ffffff, #aaaaaa);

  -webkit-background-clip: text;
  background-clip: text;

  -webkit-text-fill-color: transparent;
  color: transparent;
}

.hero p {
  margin-top: 15px;
  color: var(--muted);
  font-size: 18px;
}

/* SEARCH */
.search-box {
  margin-top: 35px;
  display: flex;
  justify-content: center;
}

.search-box input {
  width: 450px;
  padding: 16px;
  border-radius: 12px 0 0 12px;
  border: 1px solid var(--border);
  background: var(--card);
  color: white;
}

.search-box button {
  padding: 16px 28px;
  border: none;
  background: var(--accent);
  color: white;
  border-radius: 0 12px 12px 0;
  cursor: pointer;
  font-weight: 600;
}

/* QUICK TAGS */
.quick {
  margin-top: 20px;
}

.quick button {
  margin: 6px;
  padding: 10px 16px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: 0.2s;
}

.quick button:hover {
  background: var(--card);
  color: white;
}

/* SORT BAR */
.sort-bar {
  padding: 0 60px;
  margin-bottom: 20px;
}

.sort-bar select {
  background: var(--card);
  color: white;
  border: 1px solid var(--border);
  padding: 12px 16px;
  border-radius: 10px;
  outline: none;
}

/* RESULTS */
.results {
  padding: 20px 60px 60px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
}

/* CARD */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 18px;
  border-radius: 16px;
  transition: 0.25s;
  position: relative;
}

.card:hover {
  transform: translateY(-8px);
  border-color: #333;
}

/* IMAGE */
.card img {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 12px;
  aspect-ratio: 1/1;
  object-fit: cover;
}

/* TITLE */
.card h3 {
  font-size: 15px;
  line-height: 1.4;
}

/* PRICE */
.price {
  color: var(--green);
  font-weight: 600;
  margin: 10px 0;
}

/* STORE */
.store {
  font-size: 13px;
  color: var(--muted);
}

/* BADGE */
.badge {
  position: absolute;
  top: 12px;
  right: 12px;
  background: var(--green);
  color: black;
  font-size: 11px;
  padding: 6px 10px;
  border-radius: 999px;
  font-weight: 600;
}

/* LINK */
.card a {
  display: inline-block;
  margin-top: 10px;
  font-size: 14px;
  color: #60a5fa;
  text-decoration: none;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 50px;
  color: var(--muted);
  border-top: 1px solid var(--border);
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">FindKpop</div>
  <div>
    <a href="#">Home</a>
    <a href="#">Artists</a>
    <a href="#">Trending</a>
  </div>
</div>

<div class="hero">
  <h1>Find the Best K-pop Deals</h1>

  <p style="color:#666;margin-top:10px;">
    Powered by live shopping data across the web
  </p>

  <div class="search-box">
    <input id="searchInput" placeholder="Search (e.g. NewJeans album)">
    <button onclick="search()">Search</button>
  </div>

  <div class="quick">
    <button onclick="quickSearch('NewJeans album')">NewJeans</button>
    <button onclick="quickSearch('BTS album')">BTS</button>
    <button onclick="quickSearch('BLACKPINK merch')">BLACKPINK</button>
    <button onclick="quickSearch('TWICE merch')">TWICE</button>
    <button onclick="quickSearch('AESPA album')">AESPA</button>
  </div>
</div>

<!-- SORT FILTER -->
<div class="sort-bar">
  <select id="sortSelect" onchange="sortResults()">
    <option value="default">Sort By</option>
    <option value="low">Price: Low → High</option>
    <option value="high">Price: High → Low</option>
    <option value="az">Name: A → Z</option>
  </select>
</div>

<div class="results" id="results"></div>

<div class="footer">
  © 2026 FindKpop — Built for fans
</div>

<script>
let currentResults = [];

/* PRICE PARSER */
function getPrice(p) {
  if (!p) return Infinity;

  const num = parseFloat(String(p).replace(/[^0-9.]/g, ""));
  return isNaN(num) ? Infinity : num;
}

/* SEARCH */
async function search() {
  const query = document.getElementById("searchInput").value.trim();
  const resultsBox = document.getElementById("results");

  if (!query) return;

  resultsBox.innerHTML = "Loading...";

try {
  const res = await fetch(
    `https://findkpop-backend.onrender.com/search?q=${encodeURIComponent(query)}`
  );

  if (!res.ok) {
    throw new Error("Network response was not OK");
  }

  const data = await res.json();

    if (!Array.isArray(data) || data.length === 0) {
      resultsBox.innerHTML = "No results found.";
      return;
    }

    currentResults = data;

    renderResults(currentResults);

  } catch (err) {
    console.error(err);
    resultsBox.innerHTML = "Error loading results. Check backend.";
  }
}

/* RENDER RESULTS */
function renderResults(data) {
  const resultsBox = document.getElementById("results");

  const cheapestIndex = data.reduce((min, item, i, arr) => {
    return getPrice(item.price) < getPrice(arr[min].price) ? i : min;
  }, 0);

  resultsBox.innerHTML = data.map((item, i) => `
    <div class="card">

      ${i === cheapestIndex
        ? `<div class="badge">Best Deal</div>`
        : ""}

      <img
        src="${item.thumbnail || item.image || 'https://via.placeholder.com/300'}"
        alt="product image"
        onerror="this.src='https://via.placeholder.com/300'"
      >

      <h3>${item.title || "No title"}</h3>

      <div class="price">${item.price || "N/A"}</div>

      <div class="store">${item.store || "Unknown store"}</div>

      ${item.link
        ? `
          <a href="${item.link}" target="_blank">
            View Deal →
          </a>
        `
        : `
          <span style="color:#666;">No link available</span>
        `
      }

    </div>
  `).join("");
}

/* SORT RESULTS */
function sortResults() {
  const sort = document.getElementById("sortSelect").value;

  let sorted = [...currentResults];

  if (sort === "low") {
    sorted.sort((a, b) => getPrice(a.price) - getPrice(b.price));
  }

  if (sort === "high") {
    sorted.sort((a, b) => getPrice(b.price) - getPrice(a.price));
  }

  if (sort === "az") {
    sorted.sort((a, b) =>
      (a.title || "").localeCompare(b.title || "")
    );
  }

  renderResults(sorted);
}

/* QUICK SEARCH */
function quickSearch(term) {
  document.getElementById("searchInput").value = term;
  search();
}
</script>

</body>
</html>
